# 效果分类标签
# 使用 datas.category 位掩码字段
# 每个位代表一种效果类型
id: effect_type
name: 效果分类
description: YGOPRO 卡片效果类型分类（位掩码字段）
items:
  - condition: d.category & 0x1 > 0
    value: 魔陷破坏
    description: "SQL示例: t.desc LIKE '%破坏%魔法%陷阱%'"
  - condition: d.category & 0x2 > 0
    value: 怪兽破坏
    description: "SQL示例: t.desc LIKE '%破坏%怪兽%'"
  - condition: d.category & 0x4 > 0
    value: 卡片除外
    description: "SQL示例: t.desc LIKE '%除外%'"
  - condition: d.category & 0x8 > 0
    value: 送去墓地
    description: "SQL示例: t.desc LIKE '%送去墓地%'"
  - condition: d.category & 0x10 > 0
    value: 返回手卡
    description: "SQL示例: t.desc LIKE '%返回手卡%' 或 t.desc LIKE '%回到手卡%'"
  - condition: d.category & 0x20 > 0
    value: 返回卡组
    description: "SQL示例: t.desc LIKE '%返回卡组%'"
  - condition: d.category & 0x40 > 0
    value: 手卡破坏
    description: "SQL示例: t.desc LIKE '%破坏%手卡%'"
  - condition: d.category & 0x80 > 0
    value: 卡组破坏
    description: "SQL示例: t.desc LIKE '%破坏%卡组%'"
  - condition: d.category & 0x100 > 0
    value: 抽卡辅助
    description: "SQL示例: t.desc LIKE '%抽卡%'"
  - condition: d.category & 0x200 > 0
    value: 卡组检索
    description: "SQL示例: t.desc LIKE '%从卡组把%{keyword}%加入手卡%'。{keyword}是用户查询中的检索目标，如'青眼白龙'、'调整'等。示例: t.desc LIKE '%从卡组把%青眼白龙%加入手卡%'"
  - condition: d.category & 0x400 > 0
    value: 卡片回收
    description: "SQL示例: t.desc LIKE '%回收%墓地%手卡%' 或 t.desc LIKE '%从墓地%加入手卡%'"
  - condition: d.category & 0x800 > 0
    value: 表示形式
    description: "SQL示例: t.desc LIKE '%变成守备表示%' 或 t.desc LIKE '%变成攻击表示%'"
  - condition: d.category & 0x1000 > 0
    value: 控制权
    description: "SQL示例: t.desc LIKE '%获得控制权%' 或 t.desc LIKE '%得到对方%控制权%'"
  - condition: d.category & 0x2000 > 0
    value: 攻守变化
    description: "SQL示例: t.desc LIKE '%攻击力%变成%' 或 t.desc LIKE '%守备力%变成%'"
  - condition: d.category & 0x4000 > 0
    value: 穿刺伤害
    description: "SQL示例: t.desc LIKE '%穿刺伤害%'"
  - condition: d.category & 0x8000 > 0
    value: 多次攻击
    description: "SQL示例: t.desc LIKE '%2次攻击%' 或 t.desc LIKE '%多次攻击%'"
  - condition: d.category & 0x10000 > 0
    value: 攻击限制
    description: "SQL示例: t.desc LIKE '%不能攻击%'"
  - condition: d.category & 0x20000 > 0
    value: 直接攻击
    description: "SQL示例: t.desc LIKE '%直接攻击%'"
  - condition: d.category & 0x40000 > 0
    value: 特殊召唤
    description: "SQL示例: t.desc LIKE '%特殊召唤%' 或 t.desc LIKE '%从墓地特殊召唤%'"
  - condition: d.category & 0x80000 > 0
    value: 衍生物
    description: "SQL示例: t.desc LIKE '%衍生物%'"
  - condition: d.category & 0x100000 > 0
    value: 种族相关
    description: "SQL示例: t.desc LIKE '%龙族%' 或 t.desc LIKE '%种族%'"
  - condition: d.category & 0x200000 > 0
    value: 属性相关
    description: "SQL示例: t.desc LIKE '%光属性%' 或 t.desc LIKE '%暗属性%'"
  - condition: d.category & 0x400000 > 0
    value: LP伤害
    description: "SQL示例: t.desc LIKE '%受到%伤害%' 或 t.desc LIKE '%失去%生命值%'"
  - condition: d.category & 0x800000 > 0
    value: LP回复
    description: "SQL示例: t.desc LIKE '%回复%生命值%' 或 t.desc LIKE '%恢复%LP%'"
  - condition: d.category & 0x1000000 > 0
    value: 破坏耐性
    description: "SQL示例: t.desc LIKE '%不会被破坏%'"
  - condition: d.category & 0x2000000 > 0
    value: 效果耐性
    description: "SQL示例: t.desc LIKE '%不受%效果%'"
  - condition: d.category & 0x4000000 > 0
    value: 指示物
    description: "SQL示例: t.desc LIKE '%放置%指示物%' 或 t.desc LIKE '%指示物%'"
  - condition: d.category & 0x8000000 > 0
    value: 幸运
    description: "SQL示例: t.desc LIKE '%随机%' 或 t.desc LIKE '%投掷%'"
  - condition: d.category & 0x10000000 > 0
    value: 融合相关
    description: "SQL示例: t.desc LIKE '%融合召唤%' 或 t.desc LIKE '%融合素材%'"
  - condition: d.category & 0x20000000 > 0
    value: 同调相关
    description: "SQL示例: t.desc LIKE '%同调召唤%' 或 t.desc LIKE '%调整%'"
  - condition: d.category & 0x40000000 > 0
    value: 超量相关
    description: "SQL示例: t.desc LIKE '%超量召唤%' 或 t.desc LIKE '%XYZ%'"
  - condition: d.category & 0x80000000 > 0
    value: 效果无效
    description: "SQL示例: t.desc LIKE '%效果无效%' 或 t.desc LIKE '%无效化%'"
