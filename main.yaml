version: "1.0"
name: "游戏王卡片标签配置"
id: "ygopro_card_labels"
database:
  type: "sqlite"
  tables:
    - name: "datas"
      alias: "d"
    - name: "texts"
      alias: "t"
      join: "left"
      # 未指定on条件，默认使用 d.id = t.id

mappings:
  # 名称
  - id: "name"
    name: "名称"
    items:
      - condition: "t.name"
        name: "{field}"

  # 效果描述
  - id: "desc"
    name: "效果"
    items:
      - condition: "t.desc"
        name: "{field}"

  # 名称+效果
  - id: "name_desc"
    name: "名称+效果查找"
    items:
      - condition: "(t.name LIKE '%{keyword}%' OR t.desc LIKE '%{keyword}%')"
        name: "名称或效果包含{keyword}"

  # 卡片类型
  - id: "card_type"
    name: "卡片类型"
    items:
      # 怪兽子类型
      - condition: "(d.type & 1) > 0 AND ((d.type & 32) = 0) AND ((d.type & 64) = 0)"
        name: "通常怪兽"
      - condition: "(d.type & 1) > 0 AND (d.type & 32) > 0"
        name: "效果怪兽"
      - condition: "(d.type & 1) > 0 AND (d.type & 4096) > 0"
        name: "调整怪兽"
      - condition: "(d.type & 1) > 0 AND (d.type & 64) > 0"
        name: "融合怪兽"
      - condition: "(d.type & 1) > 0 AND (d.type & 8192) > 0"
        name: "同调怪兽"
      - condition: "(d.type & 1) > 0 AND (d.type & 8388608) > 0"
        name: "XYZ怪兽"
      - condition: "(d.type & 1) > 0 AND (d.type & 67108864) > 0"
        name: "连接怪兽"
      - condition: "(d.type & 1) > 0 AND (d.type & 128) > 0"
        name: "仪式怪兽"
      - condition: "(d.type & 1) > 0 AND (d.type & 16777216) > 0"
        name: "灵摆怪兽"
      
      # 魔法子类型
      - condition: "(d.type & 2) > 0 AND ((d.type & 128) = 0) AND ((d.type & 65536) = 0) AND ((d.type & 131072) = 0) AND ((d.type & 262144) = 0) AND ((d.type & 524288) = 0)"
        name: "通常魔法"
      - condition: "(d.type & 2) > 0 AND (d.type & 131072) > 0"
        name: "永续魔法"
      - condition: "(d.type & 2) > 0 AND (d.type & 262144) > 0"
        name: "装备魔法"
      - condition: "(d.type & 2) > 0 AND (d.type & 65536) > 0"
        name: "速攻魔法"
      - condition: "(d.type & 2) > 0 AND (d.type & 524288) > 0"
        name: "场地魔法"
      - condition: "(d.type & 2) > 0 AND (d.type & 128) > 0"
        name: "仪式魔法"
      
      # 陷阱子类型
      - condition: "(d.type & 4) > 0 AND ((d.type & 131072) = 0) AND ((d.type & 1048576) = 0)"
        name: "通常陷阱"
      - condition: "(d.type & 4) > 0 AND (d.type & 131072) > 0"
        name: "永续陷阱"
      - condition: "(d.type & 4) > 0 AND (d.type & 1048576) > 0"
        name: "反击陷阱"
  
  # 属性
  - id: "attribute"
    name: "属性"
    items:
      - condition: "d.attribute = 0"
        name: "无"
      - condition: "d.attribute = 1"
        name: "地"
      - condition: "d.attribute = 2"
        name: "水"
      - condition: "d.attribute = 4"
        name: "炎"
      - condition: "d.attribute = 8"
        name: "风"
      - condition: "d.attribute = 16"
        name: "光"
      - condition: "d.attribute = 32"
        name: "暗"
      - condition: "d.attribute = 64"
        name: "神"
  
  # 种族
  - id: "race"
    name: "种族"
    items:
      - condition: "d.race = 0"
        name: "无"
      - condition: "d.race = 1"
        name: "战士"
      - condition: "d.race = 2"
        name: "魔法师"
      - condition: "d.race = 4"
        name: "天使"
      - condition: "d.race = 8"
        name: "恶魔"
      - condition: "d.race = 16"
        name: "不死"
      - condition: "d.race = 32"
        name: "机械"
      - condition: "d.race = 64"
        name: "水"
      - condition: "d.race = 128"
        name: "炎"
      - condition: "d.race = 256"
        name: "岩石"
      - condition: "d.race = 512"
        name: "鸟兽"
      - condition: "d.race = 1024"
        name: "植物"
      - condition: "d.race = 2048"
        name: "昆虫"
      - condition: "d.race = 4096"
        name: "雷"
      - condition: "d.race = 8192"
        name: "龙"
      - condition: "d.race = 16384"
        name: "兽"
      - condition: "d.race = 32768"
        name: "兽战士"
      - condition: "d.race = 65536"
        name: "恐龙"
      - condition: "d.race = 131072"
        name: "鱼"
      - condition: "d.race = 262144"
        name: "海龙"
      - condition: "d.race = 524288"
        name: "爬虫"
      - condition: "d.race = 1048576"
        name: "念动力"
      - condition: "d.race = 2097152"
        name: "幻神兽"
      - condition: "d.race = 4194304"
        name: "创造神"
      - condition: "d.race = 8388608"
        name: "幻龙"
  
  # OCG/TCG
  - id: "ocg_tcg"
    name: "OCG/TCG"
    items:
      - condition: "d.ot = 1"
        name: "OCG"
      - condition: "d.ot = 2"
        name: "TCG"
      - condition: "d.ot = 3"
        name: "OCG|TCG"
      - condition: "d.ot = 4"
        name: "自定义"
      - condition: "d.ot = 9"
        name: "OCG|TCG"
      - condition: "d.ot = 11"
        name: "OCG|TCG"
  
  # 等级/阶级/连接数
  - id: "level"
    name: "等级"
    items:
      - condition: "(d.type & 8388608)"
        name: "{value}阶"
      - condition: "(d.type & 67108864)"
        name: "LINK-{value}"
      - condition: "(d.type & 1)"
        name: "★{value}"

  # 攻击力
  - id: "atk"
    name: "攻击力"
    items:
      - condition: "(d.type & 1)"
        name: "{value}ATK"
  
  # 防御力
  - id: "def"
    name: "防御力"
    items:
      - condition: "(d.type & 1) AND ((d.type & 67108864) = 0)"
        name: "{value}DEF"
