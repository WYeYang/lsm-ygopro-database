version: "1.0"
name: 游戏王卡片标签配置
id: ygopro_card_labels
database:
  type: sqlite
  path: ./cards.cdb
  tables:
    - name: datas
      alias: d
    - name: texts
      alias: t
      join: left
      on: d.id = t.id

mappings:
  # 名称
  - id: name
    name: 名称
    description: 卡片名称（文本字段，可用于名称搜索）
    condition: t.name IS NOT NULL
    value: t.name

  # 效果描述
  - id: desc
    name: 效果
    description: 卡片效果描述（文本字段，可用于效果搜索）
    condition: t.desc IS NOT NULL
    value: t.desc

  # 卡片类型（互斥）
  - id: card_type
    name: 卡片类型
    items:
      - condition: (d.type & 1) > 0 AND (d.type & 32) = 0
        value: 通常
      - condition: (d.type & 1) > 0 AND (d.type & 32) > 0
        value: 效果
      - condition: (d.type & 2) > 0
        value: 魔法
      - condition: (d.type & 4) > 0
        value: 陷阱

  # 魔法类型
  - id: spell_type
    name: 魔法类型
    condition: (d.type & 2) > 0
    value: 通常
    items:
      - condition: (d.type & 131072) > 0
        value: 永续
      - condition: (d.type & 262144) > 0
        value: 装备
      - condition: (d.type & 65536) > 0
        value: 速攻
      - condition: (d.type & 524288) > 0
        value: 场地
      - condition: (d.type & 128) > 0
        value: 仪式

  # 陷阱类型
  - id: trap_type
    name: 陷阱类型
    condition: (d.type & 4) > 0
    value: 通常
    items:
      - condition: (d.type & 131072) > 0
        value: 永续
      - condition: (d.type & 1048576) > 0
        value: 反击

  # 怪兽分类（可叠加）
  - id: monster_type
    name: 怪兽分类
    items:
      - condition: (d.type & 64) > 0
        value: 融合
      - condition: (d.type & 8192) > 0
        value: 同调
      - condition: (d.type & 8388608) > 0
        value: XYZ
      - condition: (d.type & 67108864) > 0
        value: 连接
      - condition: (d.type & 128) > 0
        value: 仪式
      - condition: (d.type & 16777216) > 0
        value: 灵摆

  # 调整
  - id: tuner
    name: 调整
    items:
      - condition: (d.type & 4096) > 0
        value: 调整

  # 属性
  - id: attribute
    name: 属性
    items:
      - condition: d.attribute = 1
        value: 地
      - condition: d.attribute = 2
        value: 水
      - condition: d.attribute = 4
        value: 炎
      - condition: d.attribute = 8
        value: 风
      - condition: d.attribute = 16
        value: 光
      - condition: d.attribute = 32
        value: 暗
      - condition: d.attribute = 64
        value: 神

  # 种族
  - id: race
    name: 种族
    items:
      - condition: d.race = 1
        value: 战士
      - condition: d.race = 2
        value: 魔法师
      - condition: d.race = 4
        value: 天使
      - condition: d.race = 8
        value: 恶魔
      - condition: d.race = 16
        value: 不死
      - condition: d.race = 32
        value: 机械
      - condition: d.race = 64
        value: 水
      - condition: d.race = 128
        value: 炎
      - condition: d.race = 256
        value: 岩石
      - condition: d.race = 512
        value: 鸟兽
      - condition: d.race = 1024
        value: 植物
      - condition: d.race = 2048
        value: 昆虫
      - condition: d.race = 4096
        value: 雷
      - condition: d.race = 8192
        value: 龙
      - condition: d.race = 16384
        value: 兽
      - condition: d.race = 32768
        value: 兽战士
      - condition: d.race = 65536
        value: 恐龙
      - condition: d.race = 131072
        value: 鱼
      - condition: d.race = 262144
        value: 海龙
      - condition: d.race = 524288
        value: 爬虫
      - condition: d.race = 1048576
        value: 念动力
      - condition: d.race = 2097152
        value: 幻神兽
      - condition: d.race = 4194304
        value: 创造神
      - condition: d.race = 8388608
        value: 幻龙

  # OCG/TCG
  - id: ocg_tcg
    name: OCG/TCG
    items:
      - condition: d.ot = 1
        value: OCG
      - condition: d.ot = 2
        value: TCG
      - condition: d.ot = 3
        value: "OCG|TCG"
      - condition: d.ot = 4
        value: 自定义
      - condition: d.ot = 9
        value: "OCG|TCG"
      - condition: d.ot = 11
        value: "OCG|TCG"

  # 等级
  - id: level
    name: 等级
    condition: (d.type & 1)
    value: d.level

  # 阶级
  - id: rank
    name: 阶级
    condition: (d.type & 8388608)
    value: d.level

  # 连接数
  - id: link
    name: LINK
    condition: (d.type & 67108864)
    value: d.level

  # 攻击力
  - id: atk
    name: 攻击力
    condition: (d.type & 1)
    value: d.atk

  # 防御力
  - id: def
    name: 防御力
    condition: (d.type & 1) AND (d.type & 67108864) = 0
    value: d.def
